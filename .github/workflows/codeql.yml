name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 8 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Swift CodeQL is only supported on macOS runners.
          - language: swift
            build-mode: manual
            runner: macos-latest
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: actions
            build-mode: none
            runner: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Manual build for Swift: the Xcode project is generated by XcodeGen
      # (project.yml) and is not committed, so CodeQL autobuild cannot find
      # it. Mirror the build steps from ci.yml so the extractor can trace it.
      - name: Select latest stable Xcode
        if: matrix.language == 'swift'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        if: matrix.language == 'swift'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: matrix.language == 'swift'
        run: xcodegen generate

      - name: Build (no code signing)
        if: matrix.language == 'swift'
        run: |
          xcodebuild build \
            -project PowerSnek.xcodeproj \
            -scheme PowerSnek \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
